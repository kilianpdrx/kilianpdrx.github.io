---
layout: default
---
{% include header.html %}
{{ content }}
{% include footer.html %}

<div id="project-drawer" class="drawer" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
  <div class="drawer__backdrop" tabindex="-1"></div>
  <aside class="drawer__panel">
    <header class="drawer__header">
      <div class="drawer__title-group">
        <h2 id="drawer-title" class="drawer__title"></h2>
        <span class="drawer__meta"></span>
      </div>
      <button type="button" class="drawer__close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </header>
    <div class="drawer__body"></div>
  </aside>
</div>
